# RTSP流配置文件

# 图像话题 (根据实际情况修改)
image_topic: "/camera/image_raw"

# RTSP服务器端口
rtsp_port: 8554

# 流名称
stream_name: "mapping"

# 视频参数
fps: 30
width: 1280
height: 720
bitrate: "2M"

# 编码参数
encoder:
  preset: "ultrafast"  # ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
  tune: "zerolatency"  # film, animation, grain, stillimage, fastdecode, zerolatency
